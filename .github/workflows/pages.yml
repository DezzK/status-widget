name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    env:
      QR_BASE64: ${{ secrets.DONATION_QR_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject donation QR
        run: |
          if [[ -n "$QR_BASE64" ]]; then
            echo "$QR_BASE64" | base64 -d > docs/donate_qr.png
            echo "Donation QR replaced ($(wc -c < docs/donate_qr.png) bytes)."
          else
            echo "DONATION_QR_BASE64 secret is not set, keeping placeholder."
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
